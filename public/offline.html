<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020617" />
    <title>Red de Jóvenes · Sin conexión</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #020617;
        color: #ffffff;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 30% 20%, rgba(16, 185, 129, 0.18), transparent 32%),
          radial-gradient(circle at 70% 30%, rgba(251, 191, 36, 0.16), transparent 30%),
          linear-gradient(135deg, #020617, #1e1b4b 52%, #0f172a);
      }

      main {
        width: min(100%, 560px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 32px;
        padding: 32px;
        background: rgba(255, 255, 255, 0.07);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(20px);
      }

      p {
        color: rgba(255, 255, 255, 0.72);
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        margin-top: 16px;
        border-radius: 999px;
        padding: 12px 18px;
        background: linear-gradient(90deg, #6ee7b7, #fef08a, #fcd34d);
        color: #020617;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Red de Jóvenes</h1>
      <p>
        No hay conexión en este momento. Vuelve a intentarlo cuando tengas
        internet para seguir con oración, comunidad y devocional.
      </p>
      <a href="/">Volver al inicio</a>
    </main>
  </body>
</html>
